[project]
name = "aidlc-trend-reports"
version = "0.1.0"
description = "Trend reporting across AIDLC rules evaluation releases"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
]

[project.scripts]
trend-report = "trend_reports.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trend_reports"]
