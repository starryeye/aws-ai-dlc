[project]
name = "aidlc-shared"
version = "0.1.0"
description = "Common utilities shared across AIDLC evaluation packages"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]
