[project]
name = "aidlc-reporting"
version = "0.1.0"
description = "Consolidated report generation aggregating all evaluation dimensions"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reporting"]
