[project]
name = "aidlc-runner"
version = "0.1.0"
description = "Two-agent AIDLC workflow runner using Strands Agents"
requires-python = ">=3.13"
dependencies = [
    "strands-agents>=0.1.0",
    "strands-agents-tools>=0.1.0",
    "pyyaml>=6.0",
]

[project.scripts]
aidlc-runner = "aidlc_runner.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aidlc_runner"]
