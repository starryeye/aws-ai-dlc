[project]
name = "aidlc-nonfunctional"
version = "0.1.0"
description = "NFR evaluation — token consumption, execution time, cross-model consistency"
requires-python = ">=3.13"
dependencies = [
    "aidlc-shared",
    "pyyaml>=6.0",
]

[tool.uv.sources]
aidlc-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nonfunctional"]
