[project]
name = "aidlc-contracttest"
version = "0.1.0"
description = "API contract test harness — validate generated code against an API spec"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contracttest"]
