[project]
name = "aidlc-ide-harness"
version = "0.1.0"
description = "Automated IDE instrumentation for AIDLC evaluation"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ide_harness"]
