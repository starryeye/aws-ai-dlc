[project]
name = "aidlc-qualitative"
version = "0.1.0"
description = "Semantic evaluation — score AIDLC document outputs for similarity of intent and design"
requires-python = ">=3.13"
dependencies = [
    "aidlc-shared",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
llm = [
    "boto3>=1.35.0",
]
dev = [
    "pytest>=8.0.0",
]

[tool.uv.sources]
aidlc-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qualitative"]
