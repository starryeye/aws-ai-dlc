version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tableorder-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=your-256-bit-secret-key-for-development-environment-only
    networks:
      - tableorder-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tableorder-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tableorder-network
    restart: unless-stopped

networks:
  tableorder-network:
    driver: bridge
